<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>weight log</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <h1>weight log</h1>
      <p class="sub">log it daily, watch the trend</p>
    </header>

    <section class="card entry">
      <form id="entryForm" class="entryForm">
        <label class="field">
          <span>weight</span>
          <div class="row">
            <input id="weightInput" type="number" step="0.1" inputmode="decimal" placeholder="74.2" required />
            <span class="suffix">kg</span>
          </div>
        </label>
        <label class="field">
          <span>date</span>
          <div class="row">
            <input id="dateInput" type="date" required />
          </div>
        </label>
        <button type="submit" class="primary">save</button>
      </form>
    </section>

    <section class="card stats">
      <div class="stat">
        <span class="label">latest</span>
        <span id="statLatest" class="value">--</span>
      </div>
      <div class="stat">
        <span class="label">7-day avg</span>
        <span id="statAvg" class="value">--</span>
      </div>
      <div class="stat">
        <span class="label">trend (last 30d)</span>
        <span id="statTrend" class="value">--</span>
      </div>
    </section>

    <section class="card chartCard">
      <canvas id="chart" height="220"></canvas>
    </section>

    <section class="card target">
      <label class="field">
        <span>target weight</span>
        <div class="row">
          <input id="targetInput" type="number" step="0.1" inputmode="decimal" placeholder="70" />
          <span class="suffix">kg</span>
          <button id="clearTargetBtn" type="button" class="link">clear</button>
        </div>
      </label>
      <p id="targetHint" class="hint"></p>
    </section>

    <section class="card list">
      <h2>entries</h2>
      <ul id="entryList"></ul>
      <p id="emptyMsg" class="empty">nothing logged yet.</p>
    </section>

    <p class="footnote">
      stored in your browser only. clearing site data wipes the history.
    </p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
